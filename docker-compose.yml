version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: springdb
      MYSQL_USER: springuser
      MYSQL_PASSWORD: spring123

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:8
    container_name: redis-cache
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:4.3.2-management
    container_name: rabbitmq
    restart: always

    ports:
      - "5672:5672"    # AMQP protocol port (apps connect here)
      - "15672:15672"  # Management UI web console port

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

volumes:
  mysql-data:
  redis-data: